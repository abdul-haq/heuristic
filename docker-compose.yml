services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: heuristic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: heuristic
      POSTGRES_PASSWORD: heuristic_dev_password
      POSTGRES_DB: heuristic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heuristic"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
